name: Feature request
description: Suggest an improvement for JimmyBox Studio
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult or missing?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should JimmyBox Studio do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - VM
        - Projects
        - Import
        - Database
        - Hosts
        - Checkpoints
        - Upgrade to Multiuser
        - UI
        - Build/Release
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
